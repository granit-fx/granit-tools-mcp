name = "granit-docs-mcp"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — configure via Cloudflare Dashboard > Workers > Triggers > Custom Domains
# Target: mcp.granit-fx.dev
# The domain must be proxied through Cloudflare (orange-cloud) on the granit-fx.dev zone.
# Workers custom domains are preferred over routes for cleaner configuration.

[vars]
SEARCH_INDEX_URL = "https://granit-fx.dev/search-index.json"

[observability]
enabled = true

# Replace PLACEHOLDER IDs after running:
#   npx wrangler kv namespace create DOCS_CACHE
#   npx wrangler kv namespace create DOCS_CACHE --preview
[[kv_namespaces]]
binding = "DOCS_CACHE"
id = "PLACEHOLDER_KV_ID"
preview_id = "PLACEHOLDER_KV_PREVIEW_ID"
